name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Set timezone to America/Sao_Paulo
        run: sudo timedatectl set-timezone America/Sao_Paulo

      - name: Verify timezone change
        run: timedatectl && date

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y upx

      - name: Run Tests
        run: go test ./...

      - name: Build Binaries
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          VERSION=$VERSION make build-linux-amd64 build-linux-arm64

      - name: Package Binaries
        run: |
          for arch in amd64 arm64; do
            ARCHIVE_NAME="check_domain_${VERSION}_linux_${arch}.tar.gz"
            cp "build/check_domain-linux-${arch}" check_domain
            tar -czvf "$ARCHIVE_NAME" check_domain zbx_domain_expiry.yaml
            rm check_domain
          done

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            check_domain_${{ env.VERSION }}_linux_amd64.tar.gz
            check_domain_${{ env.VERSION }}_linux_arm64.tar.gz
            zbx_domain_expiry.yaml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}