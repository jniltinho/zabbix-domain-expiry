name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Set timezone to America/Sao_Paulo
        run: sudo timedatectl set-timezone America/Sao_Paulo

      - name: Verify timezone change
        run: timedatectl && date

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y upx

      - name: Run Tests
        run: go test ./...

      - name: Build Binary
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          VERSION=$VERSION make build-linux-amd64

      - name: Package Binary
        run: |
          ARCHIVE_NAME="check_domain_${VERSION}_linux_amd64.tar.gz"
          cp build/check_domain-linux-amd64 check_domain
          tar -czvf "$ARCHIVE_NAME" check_domain zbx_domain_expiry.yaml
          rm check_domain
          echo "ARCHIVE_NAME=$ARCHIVE_NAME" >> $GITHUB_ENV

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            ${{ env.ARCHIVE_NAME }}
            zbx_domain_expiry.yaml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}